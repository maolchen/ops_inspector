version: '3.8'

services:
  ops-inspection:
    build:
      context: .
      dockerfile: Dockerfile
    image: ops-inspection:latest
    container_name: ops-inspection
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      # 数据持久化（SQLite 数据库）
      - inspection-data:/app/backend/data
    environment:
      - TZ=Asia/Shanghai
      - PORT=5000
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

volumes:
  inspection-data:
    driver: local
